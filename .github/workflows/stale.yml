name: Mark Stale Issues and PRs

on:
  schedule:
    - cron: "0 0 * * *"  # Runs daily at midnight UTC
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

          # Issues
          days-before-issue-stale: 30
          days-before-issue-close: 14
          stale-issue-label: "stale"
          stale-issue-message: >
            This issue has been automatically marked as stale because it has had no activity
            for 30 days. If this is still relevant, please leave a comment to keep it open.
            It will be closed in 14 days if no further activity occurs.
          close-issue-message: >
            This issue has been closed due to inactivity. Feel free to re-open if it
            becomes relevant again or if you have new information.

          # Pull Requests
          days-before-pr-stale: 30
          days-before-pr-close: 14
          stale-pr-label: "stale"
          stale-pr-message: >
            This PR has been automatically marked as stale because it has had no activity
            for 30 days. Please rebase or update it to keep it open.
            It will be closed in 14 days if no further activity occurs.
          close-pr-message: >
            This PR has been closed due to inactivity. Feel free to re-open if you
            resume work on it.

          # Exempt labels
          exempt-issue-labels: "pinned,security,help wanted,good first issue"
          exempt-pr-labels: "pinned,security,work-in-progress"
