name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  NODE_VERSION: "22"
  PYTHON_VERSION: "3.12"

jobs:
  # ──────────────────────────────────────────────
  # TypeScript: Lint + Typecheck + Test
  # ──────────────────────────────────────────────
  typescript:
    name: TypeScript
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Test
        run: npm test -- --ci --coverage

  # ──────────────────────────────────────────────
  # Python: Lint + Typecheck + Test
  # ──────────────────────────────────────────────
  python:
    name: Python
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Format check (ruff)
        run: ruff format --check .

      - name: Typecheck (mypy)
        run: mypy server/ adapters/ --ignore-missing-imports

      - name: Test
        run: pytest tests/ -v --tb=short

  # ──────────────────────────────────────────────
  # Docker build
  # ──────────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [typescript, python]

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t memos:ci .

      - name: Verify container starts
        run: |
          docker run -d --name memos-test -p 7400:7400 memos:ci
          sleep 5
          curl -f http://localhost:7400/health
          docker stop memos-test
