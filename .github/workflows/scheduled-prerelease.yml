name: Scheduled Pre-Release v1.5

on:
  schedule:
    # Runs at 12:00 UTC on April 3rd, 2026
    - cron: '0 12 3 4 *'
  workflow_dispatch:  # Allow manual trigger for testing

permissions:
  contents: write
  packages: write

jobs:
  build-and-test:
    name: Build & Docker Verification
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint --if-present

      - name: Run type check
        run: npm run typecheck --if-present

      - name: Run tests
        run: npm test --if-present

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt --if-exists || true
          pip install pytest --if-present || true

      - name: Run Python tests
        run: pytest --if-exists || true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (validation only)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: markgatcha/memos:v1.5-experimental
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify Docker Compose
        run: |
          docker compose config
          docker compose build --no-cache

      - name: Smoke-test Docker container
        run: |
          docker compose up -d
          sleep 10
          docker compose ps
          curl -f http://localhost:7400/health || docker compose logs
          docker compose down

  create-prerelease:
    name: Create Pre-Release v1.5-experimental
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a v1.5-experimental -m "MemOS v1.5 Experimental Pre-Release"
          git push origin v1.5-experimental

      - name: Create GitHub Pre-Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.5-experimental
          name: "MemOS v1.5 — Experimental Pre-Release 🧪"
          prerelease: true
          draft: false
          generate_release_notes: true
          body: |
            ## MemOS v1.5 Experimental Pre-Release 🧪

            > ⚠️ This is an **experimental pre-release**. Not recommended for production use.

            ### What's new in v1.5
            - See commit history for full changelog
            - Docker-verified build
            - All CI checks passed

            ### Docker
            ```bash
            docker pull markgatcha/memos:v1.5-experimental
            docker compose up
            ```

            ### Install (experimental)
            ```bash
            npm install @mem-os/sdk@experimental
            pip install memos==1.5.0a1
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
