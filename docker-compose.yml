services:
  memos:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "7400:7400"
    volumes:
      - memos-data:/root/.memos
    environment:
      - MEMOS_PORT=7400
      - MEMOS_HOST=0.0.0.0
      - MEMOS_DB_PATH=/root/.memos/memos.db
      - MEMOS_LOG_LEVEL=info
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7400/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  memos-data:
    driver: local
